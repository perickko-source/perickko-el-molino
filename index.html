<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Molino</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: none;
            overflow: hidden;
        }

        /* === NUEVA PANTALLA DE CARGA === */
        #loading-screen {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }
        
        #loading-screen img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        
        #loading-text {
            margin-top: 30px;
            font-size: 1.5em;
            font-weight: bold;
            color: #ffd700;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* === MENÚ ORIGINAL - SIN CAMBIOS === */
        #start-screen { 
            text-align: center; 
            animation: fadeIn 0.5s;
            display: none; /* Oculto al inicio */
        }
        #start-screen h1 { font-size: 3em; margin-bottom: 10px; color: #ffd700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        #start-screen p { color: #aaa; margin-bottom: 40px; font-size: 1.2em; }
        
        .menu-btn {
            display: block; width: 280px; margin: 15px auto; padding: 18px;
            font-size: 1.2em; font-weight: bold; border: none; border-radius: 10px;
            cursor: pointer; color: white; transition: transform 0.2s;
        }
        .menu-btn:active { transform: scale(0.95); }
        .btn-pvp { background: linear-gradient(135deg, #2196F3, #1976D2); }
        .btn-ai { background: linear-gradient(135deg, #FF9800, #F57C00); }

        /* === RESTO DEL JUEGO - SIN CAMBIOS === */
        #game-screen { display: none; width: 100%; max-width: 620px; text-align: center; }
        
        #game-wrapper {
            position: relative; width: 100%; height: 0; padding-bottom: 100%;
            background: #000; border: 4px solid #333; border-radius: 4px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8); margin-bottom: 20px;
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; cursor: pointer; }

        #message-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9); color: #fff;
            padding: 8px 12px; border-radius: 6px; font-weight: bold;
            text-align: center; pointer-events: none; opacity: 0;
            transition: opacity 0.3s; z-index: 10; width: 35%; font-size: 0.85em;
            box-shadow: 0 0 10px rgba(255,255,255,0.2); line-height: 1.3;
        }
        #message-overlay.visible { opacity: 1; }

        #victory-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95); padding: 20px; border-radius: 15px;
            text-align: center; border: 2px solid #ffd700;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
            z-index: 30; display: none; width: 80%;
        }
        #victory-screen h2 { color: #ffd700; margin-top: 0; }
        #victory-screen p { font-size: 1.2em; margin: 10px 0; }
        #restart-btn {
            padding: 10px 20px; font-size: 1em; background: #4CAF50; color: white;
            border: none; border-radius: 5px; cursor: pointer; margin-top: 10px;
        }

        #status-bar {
            width: 100%;
            background-color: #2a2a2a;
            padding: 12px 20px;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 15px;
            position: relative;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
        }

        .player-col { display: flex; flex-direction: column; align-items: flex-start; }
        .player-col.right { align-items: flex-end; text-align: right; }
        .p-name { font-weight: bold; font-size: 1.1em; margin-bottom: 2px; }
        .p-count { font-size: 0.85em; color: #ccc; }
        
        #turn-indicator {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2em;
            font-weight: bold;
            white-space: nowrap;
            display: none;
        }

        .red { color: #ff4444; }
        .white { color: #eeeeee; }

        #back-btn {
            background: none; border: 1px solid #555; color: #aaa; padding: 8px 15px;
            border-radius: 5px; cursor: pointer; margin-top: 5px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- === NUEVA PANTALLA DE CARGA === -->
    <div id="loading-screen">
        <img src="portada.png" alt="El Molino - Portada">
        <div id="loading-text">Cargando...</div>
    </div>

    <!-- === MENÚ ORIGINAL === -->
    <div id="start-screen">
        <h1>El Molino</h1>
        <p>Selecciona modo de juego</p>
        <button class="menu-btn btn-pvp" onclick="startGame('pvp')">👥 Jugar con Amigo</button>
        <button class="menu-btn btn-ai" onclick="startGame('pvc')">🤖 Jugar contra IA</button>
    </div>

    <!-- === JUEGO ORIGINAL - SIN CAMBIOS === -->
    <div id="game-screen">
        <div id="game-wrapper">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            <div id="message-overlay"></div>
            <div id="victory-screen">
                <h2>★ ¡VICTORIA! ★</h2>
                <p id="winner-name"></p>
                <button id="restart-btn" onclick="resetGame()">Jugar otra partida</button>
            </div>
        </div>

        <div id="status-bar">
            <div id="info-content" style="width:100%; display:flex; justify-content:space-between; transition: opacity 0.3s;">
                <div class="player-col">
                    <div id="p1-name" class="p-name red">Jugador 1</div>
                    <div class="p-count">Fichas en mano: <span id="p1-count" class="red">9</span></div>
                </div>
                
                <div class="player-col right">
                    <div id="p2-name" class="p-name white">Jugador 2</div>
                    <div class="p-count">Fichas en mano: <span id="p2-count" class="white">9</span></div>
                </div>
            </div>

            <div id="turn-indicator">
                Turno: <span id="turn-text" style="color:#ff4444">Rojo</span>
            </div>
        </div>
        
        <button id="back-btn" onclick="goToMenu()">← Volver al Menú</button>
    </div>

<script>
    // === NUEVO: Transición de carga ===
    window.addEventListener('load', function() {
        setTimeout(function() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'block';
        }, 5000); // 5 segundos de carga
    });

    // === RESTO DEL CÓDIGO ORIGINAL - SIN CAMBIOS ===
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('message-overlay');
    const startScreen = document.getElementById('start-screen');
    const gameScreen = document.getElementById('game-screen');
    const victoryScreen = document.getElementById('victory-screen');
    const winnerNameText = document.getElementById('winner-name');
    const p1Count = document.getElementById('p1-count');
    const p2Count = document.getElementById('p2-count');
    const p1Name = document.getElementById('p1-name');
    const p2Name = document.getElementById('p2-name');
    const infoContent = document.getElementById('info-content');
    const turnIndicator = document.getElementById('turn-indicator');
    const turnText = document.getElementById('turn-text');

    let gameMode = 'pvp';
    let aiTimeout = null;
    let winner = null;
    let currentPlayer = 1;
    let board = new Array(24).fill(0);
    let piecesInHand = { 1: 9, 2: 9 };
    let phase = 'placing';
    let selectedPieceIndex = -1;
    let isCapturing = false;
    let aiThinking = false;

    const coords = [
        {x: 50, y: 50}, {x: 300, y: 50}, {x: 550, y: 50},
        {x: 550, y: 300}, {x: 550, y: 550}, {x: 300, y: 550},
        {x: 50, y: 550}, {x: 50, y: 300},
        {x: 100, y: 100}, {x: 300, y: 100}, {x: 500, y: 100},
        {x: 500, y: 300}, {x: 500, y: 500}, {x: 300, y: 500},
        {x: 100, y: 500}, {x: 100, y: 300},
        {x: 150, y: 150}, {x: 300, y: 150}, {x: 450, y: 150},
        {x: 450, y: 300}, {x: 450, y: 450}, {x: 300, y: 450},
        {x: 150, y: 450}, {x: 150, y: 300}
    ];

    const connections = [
        [1, 7], [0, 2, 9], [1, 3], [2, 4, 11], [3, 5], [4, 6, 13],
        [5, 7], [0, 6, 15], [9, 15], [1, 8, 10, 17], [9, 11],
        [3, 10, 12, 19], [11, 13], [5, 12, 14, 21], [13, 15], [7, 8, 14, 23],
        [17, 23], [9, 16, 18], [17, 19], [11, 18, 20], [19, 21],
        [13, 20, 22], [21, 23], [15, 16, 22]
    ];

    const possibleMills = [
        [0,1,2], [2,3,4], [4,5,6], [6,7,0], 
        [8,9,10], [10,11,12], [12,13,14], [14,15,8], 
        [16,17,18], [18,19,20], [20,21,22], [22,23,16], 
        [1,9,17], [3,11,19], [5,13,21], [7,15,23]
    ];

    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSound(type) {
        initAudio(); 
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const now = audioCtx.currentTime;
        const o = audioCtx.createOscillator(); 
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        
        if(type === 'place') {
            o.frequency.setValueAtTime(440, now);
            g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            o.start(now); o.stop(now + 0.1);
        } else if(type === 'move') {
            o.frequency.setValueAtTime(330, now);
            g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            o.start(now); o.stop(now + 0.15);
        } else if(type === 'capture') {
            o.type = 'square';
            o.frequency.setValueAtTime(600, now); o.frequency.linearRampToValueAtTime(300, now + 0.2);
            g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
            o.start(now); o.stop(now + 0.25);
        } else if(type === 'win') {
            [523, 659, 784, 1046].forEach((f, i) => {
                const osc = audioCtx.createOscillator(); const gn = audioCtx.createGain();
                osc.connect(gn); gn.connect(audioCtx.destination);
                osc.frequency.value = f;
                gn.gain.setValueAtTime(0.1, now + i*0.15); gn.gain.exponentialRampToValueAtTime(0.001, now + i*0.15 + 0.4);
                osc.start(now + i*0.15); osc.stop(now + i*0.15 + 0.4);
            });
        }
    }

    function startGame(mode) {
        gameMode = mode;
        startScreen.style.display = 'none';
        gameScreen.style.display = 'block';
        
        if(mode === 'pvc') {
            p1Name.innerText = 'Jugador';
            p2Name.innerText = 'IA';
            p2Name.style.opacity = '0.7';
        } else {
            p1Name.innerText = 'Jugador 1';
            p2Name.innerText = 'Jugador 2';
            p2Name.style.opacity = '1';
        }
        resetGameLogic();
    }

    function goToMenu() {
        clearTimeout(aiTimeout);
        gameScreen.style.display = 'none';
        startScreen.style.display = 'block';
    }

    function resetGameLogic() {
        winner = null; board = new Array(24).fill(0); currentPlayer = 1;
        piecesInHand = { 1: 9, 2: 9 }; phase = 'placing';
        selectedPieceIndex = -1; isCapturing = false; aiThinking = false;
        victoryScreen.style.display = 'none';
        
        infoContent.style.display = 'flex';
        turnIndicator.style.display = 'none';
        
        updateUI(); drawBoard();
        showMsg("Comienza el juego<br>Turno: Rojo", 2000);
    }

    function resetGame() { resetGameLogic(); }

    function updateUI() {
        p1Count.innerText = piecesInHand[1]; 
        p2Count.innerText = piecesInHand[2];
        
        p1Name.style.opacity = (currentPlayer === 1) ? '1' : '0.5';
        p2Name.style.opacity = (currentPlayer === 2) ? '1' : '0.5';
        
        turnText.innerText = currentPlayer === 1 ? 'Rojo' : 'Blanco';
        turnText.style.color = currentPlayer === 1 ? '#ff4444' : '#eeeeee';

        if (phase === 'placing') {
            infoContent.style.display = 'flex';
            turnIndicator.style.display = 'none';
        } else {
            infoContent.style.display = 'none';
            turnIndicator.style.display = 'block';
        }
    }

    function showMsg(text, time=2000) {
        overlay.innerHTML = text; overlay.classList.add('visible');
        if(time > 0) setTimeout(() => overlay.classList.remove('visible'), time);
    }

    function drawBoard() {
        ctx.fillStyle = 'black'; ctx.fillRect(0, 0, 600, 600);
        ctx.strokeStyle = 'white'; ctx.lineWidth = 5; ctx.lineCap = 'round';
        
        let drawn = new Set();
        connections.forEach((conns, idx) => {
            conns.forEach(target => {
                let key = Math.min(idx, target) + '-' + Math.max(idx, target);
                if(!drawn.has(key)) {
                    ctx.beginPath(); ctx.moveTo(coords[idx].x, coords[idx].y); ctx.lineTo(coords[target].x, coords[target].y); ctx.stroke();
                    drawn.add(key);
                }
            });
        });

        for(let i=0; i<24; i++) {
            ctx.beginPath(); ctx.arc(coords[i].x, coords[i].y, 10, 0, Math.PI*2); ctx.fillStyle = '#555'; ctx.fill();
            if(board[i] !== 0) {
                ctx.beginPath(); ctx.arc(coords[i].x, coords[i].y, 18, 0, Math.PI*2);
                ctx.fillStyle = (board[i] === 1) ? '#ff4444' : '#eeeeee'; ctx.fill();
                ctx.strokeStyle = (board[i] === 1) ? 'white' : '#666'; ctx.lineWidth = 3; ctx.stroke();
            }
            if(selectedPieceIndex === i) {
                ctx.beginPath(); ctx.arc(coords[i].x, coords[i].y, 26, 0, Math.PI*2);
                ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 4; ctx.stroke();
            }
        }
    }

    function getClickPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = 600 / rect.width;
        const scaleY = 600 / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    function handleInput(e) {
        if(e.type === 'touchstart') e.preventDefault();
        if(winner || aiThinking) return;
        if(gameMode === 'pvc' && currentPlayer === 2) return;

        const pos = getClickPos(e);
        let closest = -1; let minDist = 40;
        for(let i=0; i<24; i++) {
            const dist = Math.hypot(coords[i].x - pos.x, coords[i].y - pos.y);
            if(dist < minDist) { minDist = dist; closest = i; }
        }
        if(closest !== -1) handleClick(closest);
    }

    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('touchstart', handleInput, {passive: false});

    function handleClick(index) {
        if(isCapturing) {
            if(board[index] === 0 || board[index] === currentPlayer) { showMsg("Selecciona ficha rival", 1000); return; }
            if(canCapture(index)) {
                board[index] = 0; isCapturing = false;
                playSound('capture');
                showMsg("¡Eliminada!", 1000); 
                checkWinCondition();
                if(!winner) switchTurn();
            } else { showMsg("¡No puedes comer<br>un molino!", 2000); }
            drawBoard(); return;
        }

        if(phase === 'placing') {
            if(board[index] !== 0) return;
            board[index] = currentPlayer; piecesInHand[currentPlayer]--;
            playSound('place');
            
            if(checkMill(index, currentPlayer)) {
                isCapturing = true;
                showMsg("¡MOLINO!<br>Elige ficha rival", 0);
                if(gameMode === 'pvc' && currentPlayer === 2) setTimeout(aiTurn, 400);
            } else {
                switchTurn();
            }
        } 
        else {
            if(selectedPieceIndex === -1) { 
                if(board[index] === currentPlayer) {
                    selectedPieceIndex = index;
                    drawBoard();
                    return; 
                }
                return; 
            }
            if(index === selectedPieceIndex) { selectedPieceIndex = -1; drawBoard(); return; }
            if(board[index] === currentPlayer) { selectedPieceIndex = index; drawBoard(); return; }
            
            if(board[index] === 0) {
                if(isAdjacent(selectedPieceIndex, index)) {
                    board[index] = currentPlayer; board[selectedPieceIndex] = 0;
                    playSound('move');
                    let movedTo = index; selectedPieceIndex = -1;
                    
                    if(checkMill(movedTo, currentPlayer)) {
                        isCapturing = true;
                        showMsg("¡MOLINO!<br>Elige ficha rival", 0);
                        if(gameMode === 'pvc' && currentPlayer === 2) setTimeout(aiTurn, 400);
                    } else {
                        if(checkBlockWin()) return; 
                        switchTurn();
                    }
                } else { showMsg("Movimiento inválido", 1000); }
            }
        }
        drawBoard(); updateUI();
    }

    function switchTurn() {
        currentPlayer = (currentPlayer === 1) ? 2 : 1;
        if(piecesInHand[1] === 0 && piecesInHand[2] === 0) phase = 'moving';
        updateUI(); drawBoard();
        
        if(gameMode === 'pvc' && currentPlayer === 2 && !winner && !aiThinking) {
            aiThinking = true;
            aiTimeout = setTimeout(() => { aiTurn(); aiThinking = false; }, 600);
        }
    }

    function checkMill(idx, player) {
        return possibleMills.some(mill => mill.includes(idx) && board[mill[0]] === player && board[mill[1]] === player && board[mill[2]] === player);
    }

    function canCapture(idx) {
        const opp = (currentPlayer === 1) ? 2 : 1;
        if(!checkMill(idx, opp)) return true;
        for(let i=0; i<24; i++) { if(board[i] === opp && !checkMill(i, opp)) return false; }
        return true;
    }

    function isAdjacent(a, b) { return connections[a].includes(b); }

    function checkBlockWin() {
        const opp = (currentPlayer === 1) ? 2 : 1;
        let canMove = false;
        if(phase === 'moving') {
            for(let i=0; i<24; i++) {
                if(board[i] === opp) { for(let n of connections[i]) { if(board[n] === 0) { canMove = true; break; } } }
                if(canMove) break;
            }
            if(!canMove) { declareWinner(currentPlayer); return true; }
        }
        return false;
    }

    function checkWinCondition() {
        if(phase === 'moving') {
            const opp = (currentPlayer === 1) ? 2 : 1;
            let count = board.filter(x => x === opp).length;
            if(count < 3) declareWinner(currentPlayer);
        }
    }

    function declareWinner(p) {
        winner = p;
        const name = (p === 1) ? (gameMode==='pvc'?'Jugador':'Rojo') : (gameMode==='pvc'?'IA':'Blanco');
        const color = (p === 1) ? '#ff4444' : '#eeeeee';
        winnerNameText.innerHTML = `<span style="color:${color}">${name}</span> ha ganado`;
        victoryScreen.style.display = 'block';
        playSound('win');
    }

    function aiTurn() {
        if(winner) return;
        
        if(isCapturing) {
            let target = -1;
            for(let i=0; i<24; i++) { if(board[i] === 1 && !checkMill(i, 1)) { target = i; break; } }
            if(target === -1) for(let i=0; i<24; i++) { if(board[i] === 1) { target = i; break; } }
            if(target !== -1) handleClick(target);
            return;
        }

        if(phase === 'placing') {
            let best = -1;
            for(let i=0; i<24; i++) { if(board[i]===0) { board[i]=2; if(checkMill(i,2)){board[i]=0; best=i; break;} board[i]=0; } }
            if(best===-1) for(let i=0; i<24; i++) { if(board[i]===0) { board[i]=1; if(checkMill(i,1)){board[i]=0; best=i; break;} board[i]=0; } }
            if(best===-1) { let empties=[]; for(let i=0;i<24;i++) if(board[i]===0) empties.push(i); best=empties[Math.floor(Math.random()*empties.length)]; }
            handleClick(best);
        } else {
            let myPieces = board.map((v,i) => v===2 ? i : -1).filter(i => i!==-1);
            let moves = [];
            for(let p of myPieces) for(let n of connections[p]) if(board[n]===0) moves.push({f:p, t:n});
            if(moves.length === 0) return;
            
            let best = null;
            for(let m of moves) { board[m.t]=2; board[m.f]=0; if(checkMill(m.t,2)){board[m.t]=0; board[m.f]=2; best=m; break;} board[m.t]=0; board[m.f]=2; }
            if(!best) for(let m of moves) { board[m.t]=1; if(checkMill(m.t,1)){board[m.t]=0; best=m; break;} board[m.t]=0; }
            if(!best) best = moves[Math.floor(Math.random()*moves.length)];
            
            selectedPieceIndex = best.f;
            drawBoard();
            setTimeout(() => handleClick(best.t), 400);
        }
    }

    drawBoard();
</script>
</body>
</html>
